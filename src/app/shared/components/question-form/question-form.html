<main>
  <div class="form-top-question">
    <span>{{ questionNumber }}. Question</span>
    <button (click)="delete()"><img src="../assets/Delete.svg" alt="Delete" /></button>
  </div>
  <div class="form-bottom-question">
    <app-input-field [showIcon]="false" inputWidth="100%" inputMaxWidth="none" [invalid]="questionError.length > 0"></app-input-field>
    <p class="field-error" [class.field-error-visible]="questionError.length > 0">{{ questionError || ' ' }}</p>
  </div>
  <div class="answer-form">
    <div class="answer-form-header">
      <p>Answer</p>
      <div>
        <input
          type="checkbox"
          [name]="'answer-' + questionNumber"
          [id]="'multi-answer-' + questionNumber"
          [checked]="allowMultipleAnswers"
          (change)="onAllowMultipleChanged($event)"
        />
        <span>Allow multiple answers.</span>
      </div>
    </div>
    <div class="answer-form-body">
      @for (label of answerLabels(); track label) {
        <app-answer-question-input [label]="label" [invalid]="getAnswerError(label).length > 0" [errorMessage]="getAnswerError(label)"></app-answer-question-input>
      }

      @if (answerLabels().length < 4) {
        <button class="add-answer-btn" (click)="addAnswer()">
          Add answer
          <img src="../assets/add_circle.svg" alt="" />
        </button>
      }
    </div>
  </div>
</main>
