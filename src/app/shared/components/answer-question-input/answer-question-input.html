<div class="center-inputs">
  <p>{{ label() }}.</p>
  <div class="answer-input-wrapper">
    <app-input-field [showIcon]="true" inputWidth="100%" inputMaxWidth="none" [invalid]="invalid()"></app-input-field>
    <p class="field-error" [class.field-error-visible]="errorMessage().length > 0">{{ errorMessage() || ' ' }}</p>
  </div>
</div>
