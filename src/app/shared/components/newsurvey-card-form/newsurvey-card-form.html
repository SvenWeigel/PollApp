<main #formRoot>
  <div class="form-top">
    <div class="form-top--left">
      <h3>Survey name</h3>
      <app-input-field class="form-top--left-input"></app-input-field>
      <div class="form-top--left-end-date">
        <h3>Set end date (optional)</h3>
        <select class="form-top--left-select">
          <option value="" disabled selected>Choose category</option>
          <option value="after work">after work</option>
          <option value="activity">activity</option>
          <option value="other">other</option>
        </select>
      </div>
      <app-input-field [inputMaxWidth]="'220px'" class="form-top--left-input"></app-input-field>
    </div>
    <div class="form-top--right">
      <h3>Description text (optional)</h3>
      <app-text-area class="form-top--right-textarea"></app-text-area>
    </div>
  </div>
  <div class="form-bottom">
    <div class="form-bottom--content">
      @for (q of questions; track $index) {
    <app-question-form [questionNumber]="$index + 1" (deleteQuestion)="deleteQuestion($index)"></app-question-form>
  }
      
      <app-buttons [buttonText]="' + Add next Question'" (click)="addQuestion()"></app-buttons>
    </div>
    @if (errorMessage) {
      <p>{{ errorMessage }}</p>
    }
  </div>
</main>
