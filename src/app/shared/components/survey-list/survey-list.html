<main class="content">
    <div class="survey-list-header">
        <div class="survey-list-header--btn">
            <button class="activ-surveys survey-btn" [class.active]="selectedStatus() === 'active'" [attr.aria-pressed]="selectedStatus() === 'active'" (click)="setStatus('active')">Active survey</button>
            <button class="past-surveys survey-btn" [class.active]="selectedStatus() === 'past'" [attr.aria-pressed]="selectedStatus() === 'past'" (click)="setStatus('past')">Past survey</button>
        </div>
        <div class="survey-list-header--sort">
            <select name="SortByCategories" id="SortByCategories" [value]="selectedCategory()" (change)="onCategoryChange($event)">
                <option value="All">Sort by categories</option>
                <option value="after work">after work</option>
                <option value="activity">activity</option>
                <option value="other">other</option>
            </select>
        </div>
    </div>
    <div class="survey-list">
        @for (survey of filteredSurveys(); track survey.id) {
            <app-survey-item [survey]="survey" [isClickable]="selectedStatus() !== 'past'"></app-survey-item>
        }
    </div>
</main>
